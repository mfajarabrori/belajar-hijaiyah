<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Belajar Hijaiyah - Final Logic</title>
    <style>
        @font-face {
            font-family: 'LPMQIsepMisbah';
            src: url('LPMQ Isep Misbah.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1b5e20;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
        }

        .huruf-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 4px;
            background: #1b5e20;
            flex-shrink: 0;
        }

        .btn-huruf {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 0;
            border-radius: 4px;
            font-family: 'LPMQIsepMisbah', serif;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
        }

        .btn-huruf.active {
            background: #81c784;
            color: #1b5e20;
            font-weight: bold;
        }

        .harakat-pills {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            flex-shrink: 0;
            z-index: 10;
        }

        .pill {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'LPMQIsepMisbah', serif;
            flex: 1;
            max-width: 45px;
            text-align: center;
        }

        .pill.active {
            background: white;
            color: #1b5e20;
            font-weight: bold;
        }

        .progress-container { width: 100%; height: 4px; background-color: #eee; flex-shrink: 0; }
        .progress-bar { height: 100%; background-color: #81c784; width: 0%; transition: 0.3s; }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            padding: 20px;
            overflow: hidden;
        }

        .card {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .arabic-text {
            font-family: 'LPMQIsepMisbah', serif;
            font-size: 7.5rem;
            color: #1b5e20;
            line-height: 1.2;
            text-align: center;
            direction: rtl;
            user-select: none;
        }

        .navigation {
            padding: 10px 20px 45px 20px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            background: white;
            flex-shrink: 0;
            border-top: 1px solid #eee;
        }

        button.nav-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-prev { background-color: #1b5e20; color: white; }
        .btn-next { background-color: #1b5e20; color: white; }
        
        /* Gaya tombol saat disable */
        button:disabled { 
            opacity: 0.15; 
            cursor: not-allowed;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="huruf-grid" id="hurufGrid"></div>

        <div class="harakat-pills">
            <div class="pill" onclick="jumpToHarakat(0)">َ</div>   
            <div class="pill" onclick="jumpToHarakat(1)">ً</div>   
            <div class="pill" onclick="jumpToHarakat(2)">ِ</div>   
            <div class="pill" onclick="jumpToHarakat(3)">ٍ</div>   
            <div class="pill" onclick="jumpToHarakat(4)">ُ</div>   
            <div class="pill" onclick="jumpToHarakat(5)">ٌ</div>   
            <div class="pill" onclick="jumpToHarakat(6)">ءَيْ</div> 
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="content">
            <div class="card" onclick="nextStep()">
                <div class="arabic-text" id="arabic"></div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn btn-prev" id="btnPrev" onclick="prevStep()">←</button>
            <button class="nav-btn btn-next" id="btnNext" onclick="nextStep()">→</button>
        </div>
    </div>

    <script>
        const hurufAsli = ["أ", "ب", "ت", "ث", "ج", "ح", "خ", "د", "ذ", "ر", "ز", "س", "ش", "ص", "ض", "ط", "ظ", "ع", "غ", "ف", "ق", "ك", "ل", "م", "ن", "و", "هـ", "ي"];
        
        let dataBelajar = [];
        hurufAsli.forEach((h) => {
            if (h === "أ") {
                dataBelajar.push("أَ", "أً", "إِ", "إٍ", "أُ", "أٌ", "أَيْنَ");
            } else {
                dataBelajar.push(h + "َ", h + "ً", h + "ِ", h + "ٍ", h + "ُ", h + "ٌ", h + "َيْنَ");
            }
        });

        let currentIndex = 0;
        const arabicEl = document.getElementById('arabic');
        const progressBar = document.getElementById('progressBar');
        const pills = document.querySelectorAll('.pill');
        const hurufGrid = document.getElementById('hurufGrid');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');

        hurufAsli.forEach((h, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-huruf';
            btn.innerText = h;
            btn.onclick = () => jumpToHuruf(i);
            hurufGrid.appendChild(btn);
        });

        function updateUI() {
            arabicEl.innerText = dataBelajar[currentIndex];
            
            // Highlight Hijaiyah
            const currentHurufIdx = Math.floor(currentIndex / 7);
            document.querySelectorAll('.btn-huruf').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === currentHurufIdx);
            });

            // Highlight Harakat
            pills.forEach((pill, idx) => {
                pill.classList.toggle('active', idx === (currentIndex % 7));
            });

            // Progress Bar
            progressBar.style.width = ((currentIndex % 7) + 1) / 7 * 100 + "%";

            // LOGIKA DISABLE TOMBOL
            // Matikan tombol Kiri jika di huruf pertama (Alif) & harakat pertama (a)
            btnPrev.disabled = (currentIndex === 0);
            
            // Matikan tombol Kanan jika di huruf terakhir (Ya) & harakat terakhir (aina)
            btnNext.disabled = (currentIndex === dataBelajar.length - 1);
        }

        function nextStep() {
            if (currentIndex < dataBelajar.length - 1) {
                currentIndex++;
                updateUI();
            }
        }

        function prevStep() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function jumpToHuruf(hurufIndex) {
            const currentHarakatIndex = currentIndex % 7;
            currentIndex = (hurufIndex * 7) + currentHarakatIndex;
            updateUI();
        }

        function jumpToHarakat(harakatIndex) {
            currentIndex = (Math.floor(currentIndex / 7) * 7) + harakatIndex;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
