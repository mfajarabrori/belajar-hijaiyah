<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Belajar Hijaiyah - Fix Layout</title>
    <style>
        @font-face {
            font-family: 'LPMQIsepMisbah';
            src: url('LPMQ Isep Misbah.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1b5e20;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* Support for notch and navigation bar */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .huruf-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 8px;
            background: #1b5e20;
            flex-shrink: 0;
        }

        .btn-huruf {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 0;
            border-radius: 6px;
            font-family: 'LPMQIsepMisbah', serif;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: center;
        }

        .btn-huruf.active {
            background: #81c784;
            color: #1b5e20;
            border-color: white;
        }

        .harakat-pills {
            display: flex;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            flex-shrink: 0;
        }

        .pill {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 4px 0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'LPMQIsepMisbah', serif;
            cursor: pointer;
            flex: 1;
            max-width: 50px;
            text-align: center;
        }

        .pill.active {
            background: white;
            color: #1b5e20;
            font-weight: bold;
        }

        .progress-container { width: 100%; height: 4px; background-color: #eee; flex-shrink: 0; }
        .progress-bar { height: 100%; background-color: #81c784; width: 0%; transition: 0.3s; }

        .content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
            padding: 10px;
            min-height: 0;
        }

        .card {
            width: 100%;
            height: 100%;
            max-height: 350px;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .arabic-text {
            font-family: 'LPMQIsepMisbah', serif;
            font-size: clamp(6rem, 30vh, 12rem);
            color: #1b5e20;
            line-height: 1;
            direction: rtl;
        }

        .navigation {
            padding: 15px 20px 25px 20px; /* Padding bawah dipertebal agar tidak kena tombol navigasi Android */
            display: flex;
            justify-content: space-between;
            gap: 20px;
            background: white;
            flex-shrink: 0;
            border-top: 1px solid #eee;
        }

        button.nav-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 50px; /* Tombol bulat/oval */
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-prev { background-color: #f5f5f5; color: #1b5e20; border: 2px solid #1b5e20; }
        .btn-next { background-color: #1b5e20; color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }
        
        .arrow { font-size: 1.8rem; font-weight: 900; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="huruf-grid" id="hurufGrid"></div>

        <div class="harakat-pills">
            <div class="pill" onclick="jumpToHarakat(0)">َ</div>   
            <div class="pill" onclick="jumpToHarakat(1)">ً</div>   
            <div class="pill" onclick="jumpToHarakat(2)">ِ</div>   
            <div class="pill" onclick="jumpToHarakat(3)">ٍ</div>   
            <div class="pill" onclick="jumpToHarakat(4)">ُ</div>   
            <div class="pill" onclick="jumpToHarakat(5)">ٌ</div>   
            <div class="pill" onclick="jumpToHarakat(6)">ءَيْ</div> 
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="content">
            <div class="card" onclick="nextStep()">
                <div class="arabic-text" id="arabic"></div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn btn-prev" id="btnPrev" onclick="prevStep()">
                <span class="arrow">←</span>
            </button>
            <button class="nav-btn btn-next" id="btnNext" onclick="nextStep()">
                <span class="arrow">→</span>
            </button>
        </div>
    </div>

    <script>
        const hurufDasar = ["أ", "ب", "ت", "ث", "ج", "ح", "خ", "د", "ذ", "ر", "ز", "س", "ش", "ص", "ض", "ط", "ظ", "ع", "غ", "ف", "ق", "ك", "ل", "م", "ن", "و", "هـ", "ي"];
        let dataBelajar = [];

        hurufDasar.forEach((h) => {
            if (h === "أ") {
                dataBelajar.push("أَ", "أً", "إِ", "إٍ", "أُ", "أٌ", "أَيْنَ");
            } else {
                dataBelajar.push(h + "َ", h + "ً", h + "ِ", h + "ٍ", h + "ُ", h + "ٌ", h + "َيْنَ");
            }
        });

        let currentIndex = 0;
        const arabicEl = document.getElementById('arabic');
        const progressBar = document.getElementById('progressBar');
        const pills = document.querySelectorAll('.pill');
        const hurufGrid = document.getElementById('hurufGrid');

        hurufDasar.forEach((h, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-huruf';
            btn.innerText = h;
            btn.onclick = () => jumpToHuruf(i);
            hurufGrid.appendChild(btn);
        });

        function updateUI() {
            arabicEl.innerText = dataBelajar[currentIndex];
            
            const currentHurufIdx = Math.floor(currentIndex / 7);
            const allBtnHuruf = document.querySelectorAll('.btn-huruf');
            allBtnHuruf.forEach((btn, idx) => {
                btn.classList.toggle('active', idx === currentHurufIdx);
            });

            const currentHarakatIndex = currentIndex % 7;
            pills.forEach((pill, idx) => {
                pill.classList.toggle('active', idx === currentHarakatIndex);
            });

            progressBar.style.width = ((currentIndex % 7) + 1) / 7 * 100 + "%";

            document.getElementById('btnPrev').disabled = currentIndex === 0;
        }

        function nextStep() {
            currentIndex = (currentIndex < dataBelajar.length - 1) ? currentIndex + 1 : 0;
            updateUI();
        }

        function prevStep() {
            if (currentIndex > 0) {
                currentIndex--;
                updateUI();
            }
        }

        function jumpToHuruf(hurufIndex) {
            currentIndex = hurufIndex * 7;
            updateUI();
        }

        function jumpToHarakat(harakatIndex) {
            currentIndex = (Math.floor(currentIndex / 7) * 7) + harakatIndex;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
