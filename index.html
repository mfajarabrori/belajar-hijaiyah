<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Hijaiyah - LPMQ Font</title>
    <style>
        /* Memasukkan Font LPMQ Isep Misbah */
        @font-face {
            font-family: 'LPMQIsepMisbah';
            src: url('LPMQ Isep Misbah.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 846px;
            background-color: #ffffff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Container Tombol Huruf (Grid) */
        .huruf-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            padding: 10px;
            background: #1b5e20;
            max-height: 180px;
            overflow-y: auto;
            border-bottom: 2px solid #2e7d32;
        }

        .btn-huruf {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 0;
            border-radius: 8px;
            font-family: 'LPMQIsepMisbah', serif;
            font-size: 1.2rem;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .btn-huruf.active {
            background: #81c784;
            color: #1b5e20;
            font-weight: bold;
            border-color: white;
        }

        /* Container Tombol Harakat */
        .harakat-pills {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
        }

        .pill {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 6px 8px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'LPMQIsepMisbah', serif;
            cursor: pointer;
            min-width: 40px;
            text-align: center;
            transition: 0.2s;
        }

        .pill.active {
            background: white;
            color: #1b5e20;
            font-weight: bold;
        }

        .progress-container { width: 100%; height: 6px; background-color: #eee; }
        .progress-bar { height: 100%; background-color: #81c784; width: 0%; transition: 0.3s; }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafafa;
        }

        .card {
            width: 80%;
            aspect-ratio: 1 / 1;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .card:active { transform: scale(0.95); }

        .arabic-text {
            font-family: 'LPMQIsepMisbah', serif;
            font-size: 11rem;
            color: #1b5e20;
            line-height: 1;
            padding-bottom: 20px;
            direction: rtl;
        }

        .navigation {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            background: white;
        }

        button.nav-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-prev { background-color: #e0e0e0; color: #424242; }
        .btn-next { background-color: #4caf50; color: white; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="huruf-grid" id="hurufGrid"></div>

        <div class="harakat-pills">
            <div class="pill" onclick="jumpToHarakat(0)">َ</div>   
            <div class="pill" onclick="jumpToHarakat(1)">ً</div>   
            <div class="pill" onclick="jumpToHarakat(2)">ِ</div>   
            <div class="pill" onclick="jumpToHarakat(3)">ٍ</div>   
            <div class="pill" onclick="jumpToHarakat(4)">ُ</div>   
            <div class="pill" onclick="jumpToHarakat(5)">ٌ</div>   
            <div class="pill" onclick="jumpToHarakat(6)">ءَيْ</div> 
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="content">
            <div class="card" onclick="nextStep()">
                <div class="arabic-text" id="arabic"></div>
            </div>
        </div>

        <div class="navigation">
            <button class="nav-btn btn-prev" id="btnPrev" onclick="prevStep()">Kembali</button>
            <button class="nav-btn btn-next" id="btnNext" onclick="nextStep()">Lanjut</button>
        </div>
    </div>

    <script>
        const hurufDasar = ["أ", "ب", "ت", "ث", "ج", "ح", "خ", "د", "ذ", "ر", "ز", "س", "ش", "ص", "ض", "ط", "ظ", "ع", "غ", "ف", "ق", "ك", "ل", "م", "ن", "و", "هـ", "ي"];
        let dataBelajar = [];

        hurufDasar.forEach((h) => {
            if (h === "أ") {
                dataBelajar.push("أَ", "أً", "إِ", "إٍ", "أُ", "أٌ", "أَيْنَ");
            } else {
                dataBelajar.push(h + "َ", h + "ً", h + "ِ", h + "ٍ", h + "ُ", h + "ٌ", h + "َيْنَ");
            }
        });

        let currentIndex = 0;
        const arabicEl = document.getElementById('arabic');
        const progressBar = document.getElementById('progressBar');
        const pills = document.querySelectorAll('.pill');
        const hurufGrid = document.getElementById('hurufGrid');

        // Render tombol hijaiyah ke grid
        hurufDasar.forEach((h, i) => {
            const btn = document.createElement('div');
            btn.className = 'btn-huruf';
            btn.innerText = h;
            btn.onclick = () => jumpToHuruf(i);
            hurufGrid.appendChild(btn);
        });

        function updateUI() {
            arabicEl.innerText = dataBelajar[currentIndex];
            
            // Highlight tombol Hijaiyah aktif
            const currentHurufIdx = Math.floor(currentIndex / 7);
            const allBtnHuruf = document.querySelectorAll('.btn-huruf');
            allBtnHuruf.forEach((btn, idx) => {
                if(idx === currentHurufIdx) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Highlight tombol harakat aktif
            const currentHarakatIndex = currentIndex % 7;
            pills.forEach((pill, idx) => {
                if (idx === currentHarakatIndex) pill.classList.add('active');
                else pill.classList.remove('active');
            });

            let step = (currentIndex % 7) + 1;
            progressBar.style.width = (step / 7) * 100 + "%";

            document.getElementById('btnPrev').disabled = currentIndex === 0;
            document.getElementById('btnNext').innerText = currentIndex === dataBelajar.length - 1 ? "Ulangi" : "Lanjut";
        }

        function nextStep() {
            currentIndex = (currentIndex < dataBelajar.length - 1) ? currentIndex + 1 : 0;
            updateUI();
        }

        function prevStep() {
            if (currentIndex > 0) currentIndex--;
            updateUI();
        }

        function jumpToHuruf(hurufIndex) {
            currentIndex = hurufIndex * 7;
            updateUI();
        }

        function jumpToHarakat(harakatIndex) {
            const currentHurufStart = Math.floor(currentIndex / 7) * 7;
            currentIndex = currentHurufStart + harakatIndex;
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
